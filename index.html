<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 猜画 - 你画我猜</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo">
                <span class="logo-icon">🎨</span>
                <h1>AI 猜画</h1>
            </div>
            <div class="header-right">
                <div class="model-section">
                    <label>选择模型</label>
                    <select id="modelSelect">
                        <optgroup label="🌐 国际模型">
                            <option value="openai">OpenAI GPT-4o</option>
                            <option value="gemini">Google Gemini</option>
                            <option value="anthropic">Anthropic Claude</option>
                        </optgroup>
                        <optgroup label="🔄 聚合平台">
                            <option value="openrouter">OpenRouter</option>
                            <option value="opendoor">OpenDoor</option>
                        </optgroup>
                        <optgroup label="🇨🇳 国内模型">
                            <option value="deepseek">DeepSeek VL</option>
                            <option value="minimax">MiniMax</option>
                            <option value="zhipu">智谱 GLM-4V</option>
                            <option value="qwen">阿里云 Qwen-VL</option>
                            <option value="spark">讯飞星火 Spark</option>
                            <option value="baidu">百度 ERNIE-ViLG</option>
                            <option value="tencent">腾讯混元</option>
                            <option value="modelscope">ModelScope 魔搭</option>
                        </optgroup>
                    </select>
                </div>
                <div class="api-key-section">
                    <div class="api-input-wrapper">
                        <input type="password" id="apiKeyInput" placeholder="输入 API Key" autocomplete="off">
                        <button class="toggle-visibility" id="toggleApiVisibility" title="显示/隐藏">
                            <span class="eye-icon">👁️</span>
                        </button>
                    </div>
                    <button class="save-api-btn" id="saveApiKey">保存</button>
                </div>
                <div class="connection-status" id="connectionStatus">
                    <span class="status-dot"></span>
                    <span class="status-text">未设置</span>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- AI Panel (Left) -->
            <aside class="ai-panel">
                <div class="panel-header">
                    <div class="ai-avatar">
                        <span class="ai-icon">🤖</span>
                    </div>
                    <div class="ai-info">
                        <h2>AI 助手</h2>
                        <p id="aiStatus">等待绘画...</p>
                    </div>
                </div>

                <div class="current-guess">
                    <h3>AI 的猜测</h3>
                    <div class="guess-content" id="guessContent">
                        <p class="placeholder">开始绘画，让我猜猜你画的是什么~</p>
                    </div>
                    <div class="guess-confidence" id="guessConfidence"></div>
                </div>

                <div class="guess-history">
                    <div class="history-header">
                        <h3>猜测历史</h3>
                        <button class="clear-history-btn" id="clearHistoryBtn" title="清除历史记录">🗑️</button>
                    </div>
                    <ul id="historyList">
                        <!-- 历史记录将通过 JS 添加 -->
                    </ul>
                </div>
            </aside>

            <!-- Drawing Area (Right) -->
            <section class="drawing-area">
                <div class="canvas-container">
                    <canvas id="drawingCanvas" width="800" height="500"></canvas>
                    <div class="canvas-overlay" id="canvasOverlay">
                        <span>🖌️ 开始绘画吧</span>
                    </div>
                </div>

                <div class="tools-bar">
                    <!-- 主工具栏 -->
                    <div class="tool-section">
                        <label>绘图</label>
                        <div class="tool-buttons">
                            <button class="tool-btn active" data-tool="brush" title="画笔 (B)">
                                <span>✏️</span>
                            </button>
                            <button class="tool-btn" data-tool="eraser" title="橡皮擦 (E)">
                                <span>🧽</span>
                            </button>
                            <button class="tool-btn" data-tool="fill" title="油漆桶填充 (G)">
                                <span>🪣</span>
                            </button>
                            <button class="tool-btn" data-tool="eyedropper" title="吸管取色 (I)">
                                <span>💧</span>
                            </button>
                        </div>
                    </div>

                    <div class="tool-section">
                        <label>特效</label>
                        <div class="tool-buttons">
                            <button class="tool-btn" data-tool="spray" title="喷枪">
                                <span>💨</span>
                            </button>
                            <button class="tool-btn" data-tool="crayon" title="蜡笔">
                                <span>🖍️</span>
                            </button>
                            <button class="tool-btn" data-tool="highlighter" title="荧光笔">
                                <span>🖌️</span>
                            </button>
                        </div>
                    </div>

                    <div class="tool-section">
                        <label>形状</label>
                        <div class="tool-buttons">
                            <button class="tool-btn" data-tool="line" title="直线 (L)">
                                <span>📏</span>
                            </button>
                            <button class="tool-btn" data-tool="rect" title="矩形 (R)">
                                <span>⬜</span>
                            </button>
                            <button class="tool-btn" data-tool="circle" title="圆形 (O)">
                                <span>⭕</span>
                            </button>
                            <button class="tool-btn" data-tool="arrow" title="箭头">
                                <span>➡️</span>
                            </button>
                            <button class="tool-btn" data-tool="star" title="星星">
                                <span>⭐</span>
                            </button>
                            <button class="tool-btn" data-tool="heart" title="心形">
                                <span>❤️</span>
                            </button>
                            <button class="tool-btn" data-tool="leaf" title="叶子">
                                <span>🍃</span>
                            </button>
                            <button class="tool-btn" data-tool="smile" title="笑脸">
                                <span>😊</span>
                            </button>
                            <button class="tool-btn" data-tool="sad" title="哭脸">
                                <span>😢</span>
                            </button>
                        </div>
                    </div>

                    <div class="color-picker-group">
                        <label>前景色</label>
                        <div class="color-row">
                            <input type="color" id="strokeColor" value="#000000" title="前景色">
                            <div class="current-color" id="currentStrokeColor" style="background: #000000;"></div>
                        </div>
                        <div class="color-options">
                            <button class="color-btn active" style="background: #000000;" data-color="#000000"></button>
                            <button class="color-btn" style="background: #1a1a2e;" data-color="#1a1a2e"></button>
                            <button class="color-btn" style="background: #e94560;" data-color="#e94560"></button>
                            <button class="color-btn" style="background: #0f3460;" data-color="#0f3460"></button>
                            <button class="color-btn" style="background: #00d9ff;" data-color="#00d9ff"></button>
                            <button class="color-btn" style="background: #39da8a;" data-color="#39da8a"></button>
                            <button class="color-btn" style="background: #ffc107;" data-color="#ffc107"></button>
                            <button class="color-btn" style="background: #ff6b35;" data-color="#ff6b35"></button>
                            <button class="color-btn" style="background: #9b59b6;" data-color="#9b59b6"></button>
                        </div>
                    </div>

                    <div class="color-picker-group">
                        <label>填充色</label>
                        <div class="color-row">
                            <input type="color" id="fillColor" value="#e94560" title="填充色">
                            <button class="no-fill-btn" id="noFillBtn" title="无填充">✖️</button>
                        </div>
                    </div>

                    <div class="brush-size-group">
                        <label>粗细</label>
                        <input type="range" id="brushSize" min="1" max="50" value="5">
                        <span id="brushSizeValue">5</span>
                    </div>

                    <div class="action-buttons">
                        <button class="action-btn" id="undoBtn" title="撤销 (Ctrl+Z)">
                            <span>↩️</span>
                        </button>
                        <button class="action-btn" id="redoBtn" title="重做 (Ctrl+Y)">
                            <span>↪️</span>
                        </button>
                        <button class="action-btn" id="clearBtn" title="清空画布">
                            <span>🗑️</span>
                        </button>
                        <button class="action-btn" id="newCanvasBtn" title="新建画布">
                            <span>📄</span>
                        </button>
                    </div>
                        <button class="action-btn primary" id="guessBtn" title="让AI猜猜">
                            <span>🤔</span> 让AI猜猜
                        </button>
                    </div>
                </div>

                <div class="mode-toggle">
                    <label class="switch">
                        <input type="checkbox" id="autoGuess">
                        <span class="slider"></span>
                    </label>
                    <span>自动识别</span>
                </div>

                <div class="canvas-settings">
                    <button class="action-btn" id="canvasBgBtn" title="设置画布背景色">
                        <span>🎨</span> 背景色
                    </button>
                    <input type="color" id="canvasBgColor" value="#ffffff" style="display:none;">
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="app-footer">
            <p>💡 提示: 绘画完成后，AI 会自动或手动分析你的作品</p>
        </footer>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <p>AI 正在分析画作...</p>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <span class="toast-message"></span>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
